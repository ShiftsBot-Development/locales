name: Automatically merge Crowdin PRs

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
          
    - name: Automatically Merge Pull Request
      uses: sudo-bot/action-pull-request-merge@v1.1.0
      if: ${{ github.event.pull_request.user.login == 'ANDROID7287' && github.event.pull_request.head.ref == 'translations' }}
      with:
          github-token: ${{ secrets.PAT_TOKEN }}
          number: ${{ github.event.pull_request.number }}
          allowed-usernames-regex: ^ANDROID7287$
          merge-method: squash
          merge-title: "Automatically merge translations from Crowdin | Workflow"
